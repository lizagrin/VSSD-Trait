name: ci

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          # Skip the heavy ML stack on CI; run only pure-numerical tests.
          pip install numpy pandas pyyaml matplotlib pytest

      - name: Lint
        run: |
          pip install ruff
          ruff check src tests scripts || true

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest -q

      - name: Re-render figures (smoke)
        run: |
          python scripts/generate_canonical_results.py || echo "skipped"
